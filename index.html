<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Honey Split</title>
    </head>
    <body>
        <div class="nav">
            <div class="user-img-name">
                <img class="user-image" src="/images/me.jpg" alt="your image" />
                <h3>Name</h3>
            </div>
            <h1 id="title">Honey Split</h1>
            <div class="hamburger">
                <div class="line1 line"></div>
                <div class="line2 line"></div>
                <div class="line3 line"></div>
            </div>
        </div>
        <!--
        <div class="side-panel">
            <h2 class="side-panel-option">Edit Profile</h2>
            <div class="side-panel-groups">
                <h2 class="side-panel-option">Groups</h2>
                <div class="side-panel-options-group">
                    <h4 class="side-panel-group-option">Travel</h4>
                </div>
                <h2 class="side-panel-option">Edit Group</h2>
                <h2 class="side-panel-option">Create Group</h2>
            </div>
            <h2 class="side-panel-option">Sign Out</h2>
        </div>

    -->

        <div class="group-transaction-bg">
            <div class="group-transaction-main">
                <div class="user-img-name-transaction">
                    <img
                        class="user-image-transaction"
                        src="/images/me.jpg"
                        alt="your image"
                    />
                    <h2 class="text-margin">Name</h2>
                </div>

                <div class="transation-total-group">
                    <div class="transaction-box">
                        <h1 class="transaction-final-total text-margin">
                            $500
                        </h1>
                    </div>
                    <div class="transaction-box">
                        <h4 class="transactions-all text-margin">
                            Transactions: 500
                        </h4>
                        <h4 class="total-spent text-margin">
                            Total spent: 40,000
                        </h4>
                    </div>
                </div>

                <div class="user-img-name-transaction">
                    <img
                        class="user-image-transaction"
                        src="/images/me.jpg"
                        alt="your image"
                    />
                    <h2 class="text-margin">Name</h2>
                </div>
            </div>
        </div>

        <div class="options-group">
            <h5 class="transaction-option text-margin">Transactions</h5>
            <h5 class="activity-option text-margin">Recent Activity</h5>
        </div>

        <div class="transaction-all-group">
            <h5 class="filter-option text-margin filter-text">
                Filter Transactions
            </h5>
            <div class="transaction-group-bg">
                <div class="transaction-top-group">
                    <h5
                        class="month-year text-margin transaction-top-group-margin"
                    >
                        February 2026
                    </h5>
                    <div class="total-spent-expenses-group">
                        <h5
                            class="total-spent-month text-margin transaction-top-group-margin"
                        >
                            900 total spent
                        </h5>
                        <div
                            class="line line-transaction transaction-top-group-margin"
                        ></div>
                        <h5
                            class="total-expenses-month text-margin transaction-top-group-margin"
                        >
                            20 expenses
                        </h5>
                    </div>
                </div>
                <!-- add bottom line here -->
                <div class="expense-group">
                    <div class="expense-left">
                        <h5 class="expense-title">
                            <strong>Olive Garden</strong>
                        </h5>
                        <h6 class="expense-date expense-info">Feburary 19</h6>
                        <h6 class="expense-user-name expense-info">
                            <strong>Jarvis</strong> paid for
                        </h6>
                    </div>
                    <h6 class="expense-cost">$70</h6>
                </div>
            </div>
        </div>
    </body>
</html>
