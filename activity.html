<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Honey Split</title>
    </head>
    <body>
        <div class="nav">
            <div class="user-img-name">
                <img src="" alt="" />
                <h3>Name</h3>
            </div>
            <h1>Honey Split</h1>
            <!-- Create Hamburger -->
        </div>

        <div class="group-transaction-main">
            <div class="user-img-name-transaction">
                <img src="" alt="" />
                <h2>Name</h2>
            </div>

            <div class="transation-total-group">
                <div class="transaction-box">
                    <h1 class="transaction-final-total">500</h1>
                </div>
                <div class="transaction-box">
                    <h4 class="transactions-all">transactions: 500</h4>
                    <h4 class="total-spent">40,000</h4>
                </div>
            </div>

            <div class="user-img-name-transaction">
                <img src="" alt="" />
                <h2>Name</h2>
            </div>
        </div>

        <div class="options-group">
            <h5 class="transaction-option">transactions</h5>
            <h5 class="activity-option">Recent Activity</h5>
        </div>

        <div class="transaction-all-group">
            <h5 class="filter-option">Filter Transactions</h5>
            <div class="transaction-group-bg">
                <div class="transaction-top-group">
                    <h5 class="month-year">Feburary 2026</h5>
                </div>
                <!-- add bottom line here -->
                <div class="expense-group">
                    <div class="expense-left">
                        <h5 class="expense-title">
                            <strong>Olive Garden</strong>
                        </h5>
                        <h6 class="expense-date">Feburary 19</h6>
                        <h6 class="expense-user-name">
                            <strong>Jarvis</strong> paid for
                        </h6>
                    </div>
                    <h6 class="expense-cost">$70</h6>
                </div>
            </div>
        </div>
    </body>
</html>
